<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tower 管理后台</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      .app-boot-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: grid;
        place-items: center;
        background:
          linear-gradient(180deg, rgba(7, 11, 20, 0.88), rgba(7, 11, 20, 0.98)),
          radial-gradient(circle at 50% 42%, rgba(34, 211, 238, 0.16), transparent 34%);
        transition: opacity 0.35s ease, visibility 0.35s ease;
      }

      .app-boot-splash--exit {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .app-boot-splash__core {
        position: relative;
        display: grid;
        place-items: center;
        width: clamp(180px, 18vw, 260px);
        aspect-ratio: 1;
        color: #ecfeff;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .app-boot-splash__core::before {
        content: "";
        position: absolute;
        inset: 18%;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.72);
        border: 1px solid rgba(34, 211, 238, 0.26);
        box-shadow:
          inset 0 0 28px rgba(34, 211, 238, 0.08),
          0 0 38px rgba(34, 211, 238, 0.14);
      }

      .app-boot-splash__core strong,
      .app-boot-splash__core small {
        position: absolute;
        left: 50%;
        z-index: 2;
        width: max-content;
        max-width: min(72vw, 360px);
        text-align: center;
        transform: translateX(-50%);
      }

      .app-boot-splash__core strong {
        top: 35%;
        font-size: clamp(18px, 1.45vw, 26px);
        font-weight: 900;
      }

      .app-boot-splash__core small {
        top: 63%;
        color: rgba(207, 250, 254, 0.68);
        font-size: 13px;
        font-weight: 700;
      }

      .app-boot-splash__orbit {
        position: absolute;
        inset: 0;
        border-radius: 999px;
        border: 1px solid rgba(34, 211, 238, 0.18);
        border-top-color: rgba(34, 211, 238, 0.95);
        border-right-color: rgba(167, 139, 250, 0.78);
        animation: app-boot-splash-spin 1.35s linear infinite;
      }

      .app-boot-splash__orbit--second {
        inset: 14%;
        animation-duration: 1.9s;
        animation-direction: reverse;
        border-top-color: rgba(52, 211, 153, 0.9);
        border-right-color: rgba(34, 211, 238, 0.46);
      }

      .app-boot-splash__dot {
        position: absolute;
        z-index: 2;
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #22d3ee;
        box-shadow: 0 0 16px #22d3ee;
        animation: app-boot-splash-pulse 1s ease-in-out infinite alternate;
      }

      @keyframes app-boot-splash-spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes app-boot-splash-pulse {
        from {
          opacity: 0.48;
          transform: scale(0.72);
        }

        to {
          opacity: 1;
          transform: scale(1.08);
        }
      }
    </style>
  </head>
  <body>
    <div id="app-boot-splash" class="app-boot-splash" aria-busy="true" aria-label="数据加载中">
      <div class="app-boot-splash__core">
        <span class="app-boot-splash__orbit"></span>
        <span class="app-boot-splash__orbit app-boot-splash__orbit--second"></span>
        <span class="app-boot-splash__dot"></span>
        <strong>数据加载中...</strong>
        <small>正在准备页面数据</small>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
